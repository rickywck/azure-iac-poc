services:
  backend:
    build:
      context: ./sample-app/backend
    env_file:
      - ./sample-app/backend/.env
    environment:
      AGENT_SERVICE_MODE: remote
      AGENT_SERVICE_URL: http://agents:8000
    ports:
      - "8000:8000"
    depends_on:
      - agents

  agents:
    build:
      context: ./sample-app/agents
    env_file:
      - ./sample-app/agents/.env
    ports:
      - "8001:8000"

  ui:
    build:
      context: ./sample-app/ui
    environment:
      BACKEND_UPSTREAM: backend:8000
    ports:
      - "8080:80"
    depends_on:
      - backend